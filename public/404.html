<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>CryptoCharity</title>
  <script>
    // SPA redirect for GitHub Pages — encodes the deep-link path into a query
    // param so the main index.html can restore it via History API.
    // See: https://github.com/rafgraph/spa-github-pages
    var pathSegmentsToKeep = 1; // keep one segment ("/Charity")
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
